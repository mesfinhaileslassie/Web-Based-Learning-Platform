<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | LearnPlatform</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-container {
            max-width: 500px;
            margin: 4rem auto;
            text-align: center;
            background: white;
            border-radius: 1rem;
            padding: 3rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #2563eb;
            margin: 0;
        }
        .error-message {
            font-size: 1.5rem;
            color: #374151;
            margin: 1rem 0;
        }
        .error-description {
            color: #6b7280;
            margin-bottom: 2rem;
        }
        .btn-home {
            display: inline-block;
            padding: 0.75rem 1.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">📘 LearnPlatform</a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="login.html">Login / Register</a>
            </div>
        </div>
    </nav>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-message">Page Not Found</h2>
        <p class="error-description">
            Oops! The page you're looking for doesn't exist or has been moved.
        </p>
        <a href="index.html" class="btn btn-home">🏠 Back to Home</a>
    </div>
</body>
</html>
