<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn | Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Learning layout specific */
        .learn-container {
            display: flex;
            min-height: calc(100vh - 70px);
        }
        .sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .main-content {
            flex: 1;
            padding: 2rem;
            background: #f9fafb;
        }
        .lesson-title {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        .lesson-content {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 1rem;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }
        .curriculum-item {
            padding: 0.5rem;
            margin-bottom: 0.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .curriculum-item:hover {
            background: #f3f4f6;
        }
        .curriculum-item.active {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 500;
        }
        .curriculum-item.completed {
            color: #059669;
            text-decoration: line-through;
            opacity: 0.7;
        }
        .module-title {
            font-weight: bold;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }
        .practice-question {
            background: #f9fafb;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #e5e7eb;
        }
        .question-text {
            font-weight: 500;
            margin-bottom: 0.75rem;
        }
        .option {
            margin: 0.5rem 0;
        }
        .feedback {
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        .feedback.correct {
            color: #059669;
        }
        .feedback.incorrect {
            color: #dc2626;
        }
        .mark-complete-btn {
            background: #10b981;
            margin-top: 1rem;
        }
        .mark-complete-btn:hover {
            background: #059669;
        }
        .completion-badge {
            display: inline-block;
            background: #d1fae5;
            color: #065f46;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }
        @media (max-width: 768px) {
            .learn-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">📘 LearnPlatform</a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="#" id="authLink">Login / Register</a>
            </div>
        </div>
    </nav>

    <div class="learn-container">
        <!-- Sidebar with curriculum -->
        <aside class="sidebar" id="sidebar">
            <div id="curriculumLoading">Loading curriculum...</div>
        </aside>

        <!-- Main content area -->
        <main class="main-content" id="mainContent">
            <div id="lessonLoading">Loading lesson...</div>
        </main>
    </div>

    <script src="js/mock-api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/learn.js"></script>
</body>
</html>
