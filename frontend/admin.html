<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | LearnPlatform</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            display: flex;
            min-height: calc(100vh - 70px);
        }
        .admin-sidebar {
            width: 250px;
            background: #1f2937;
            color: white;
            padding: 1.5rem;
        }
        .admin-sidebar a {
            display: block;
            color: #e5e7eb;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: background 0.2s;
        }
        .admin-sidebar a:hover, .admin-sidebar a.active {
            background: #374151;
            color: white;
        }
        .admin-content {
            flex: 1;
            padding: 2rem;
            background: #f9fafb;
        }
        .data-table {
            width: 100%;
            background: white;
            border-radius: 0.5rem;
            overflow: auto;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .data-table th {
            background: #f3f4f6;
        }
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            margin: 0 0.25rem;
            font-size: 1.2rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 500px;
            max-width: 90%;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: 500;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 0.25rem;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            border-bottom: 2px solid #e5e7eb;
            margin-bottom: 2rem;
        }
        .tab {
            padding: 0.5rem 1rem;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
        }
        .tab.active {
            border-bottom: 2px solid #2563eb;
            color: #2563eb;
            font-weight: bold;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .question-item {
            background: #f3f4f6;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">📘 LearnPlatform</a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="#" id="authLink">Login / Register</a>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <aside class="admin-sidebar">
            <h3>Admin Panel</h3>
            <a href="#" data-section="courses">📚 Manage Courses</a>
            <a href="#" data-section="questions">📝 Manage Questions</a>
            <a href="#" data-section="analytics">📊 Analytics</a>
        </aside>
        <main class="admin-content" id="adminContent">
            <div class="loading">Loading...</div>
        </main>
    </div>

    <!-- Modals (will be filled dynamically) -->
    <div id="modal" class="modal"><div class="modal-content"></div></div>

    <script src="js/mock-api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
